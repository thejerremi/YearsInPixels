services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5277:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - JwtSettings__Key=your_very_long_and_secure_secret_key_containing_at_least_64_characters
      - JwtSettings__Issuer=YearsInPixels_Backend
      - JwtSettings__Audience=YearsInPixels_Frontend
      - JwtSettings__AccessTokenExpirationMinutes=10
      - JwtSettings__RefreshTokenExpirationDays=7
    volumes:
      - sqlite_data:/app/data

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:5277
    depends_on:
      - backend

volumes:
  sqlite_data: